<!DOCTYPE html>
<html lang="am">
<head>
<meta charset="UTF-8">
<style>
:root {
    --myday-gold: #FFD700;
    --myday-blue: #002B5B;
    --glow: 0 0 20px rgba(255, 215, 0, 0.4);
    --cycle-speed: 60s;
}

body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: #000; overflow: hidden; display: flex; justify-content: center; align-items: center; font-family: 'Nyala', 'Inter', sans-serif; }

#start-btn { position: fixed; z-index: 1000; padding: 1.5vw 3vw; background: var(--myday-gold); border: none; font-weight: 900; cursor: pointer; border-radius: 5px; font-size: 1.2rem; box-shadow: var(--glow); }

.broadcast-container {
    width: 100vw; height: 100vh;
    background: #050505; color: white;
    display: grid;
    grid-template-areas: 
        "brand topics topics"
        "media news news"
        "social highlights highlights";
    grid-template-columns: 30% 1fr 1fr;
    grid-template-rows: 20% 1fr 15%;
    gap: 2px;
}

/* 1. BRANDING */
.brand-frame { grid-area: brand; background: #000; display: flex; align-items: center; padding: 0 5%; border-bottom: 0.5vh solid var(--myday-gold); }
.logo { width: 4.5vw; height: 4.5vw; background: var(--myday-gold); color: black; display: flex; align-items: center; justify-content: center; font-weight: 900; font-size: 1.8vw; border-radius: 8px; animation: glowPulse 3s infinite; }
.brand-text { margin-left: 1.5vw; font-size: 1.6vw; font-weight: 800; }

/* 2. TOPICS */
.topics-frame { grid-area: topics; background: var(--myday-blue); display: flex; flex-direction: column; justify-content: center; padding-left: 4%; border-bottom: 0.5vh solid var(--myday-gold); }
.main-topic { font-size: 3vw; margin: 0; text-transform: uppercase; line-height: 1; }
.sub-topic { font-size: 1.2vw; color: var(--myday-gold); margin: 0; font-style: italic; }

/* 3. MEDIA (WITH AUTHOR NOTE) */
.media-frame { grid-area: media; position: relative; background: #111; overflow: hidden; border-right: 1px solid #333; }
.slide { position: absolute; inset: 0; background-size: cover; background-position: center; opacity: 0; animation: zoomFade 30s infinite; }
.meta-note { position: absolute; bottom: 10%; left: 5%; background: rgba(0,0,0,0.85); padding: 0.8vw; border-left: 0.3vw solid var(--myday-gold); font-size: 0.9vw; z-index: 5; }

/* 4. NEWS FRAME */
.news-frame { grid-area: news; display: flex; align-items: center; justify-content: center; position: relative; padding: 2vw; }
.p-item { position: absolute; opacity: 0; font-size: 2.2vw; text-align: center; width: 85%; animation: feedInOut var(--cycle-speed) infinite; }

/* 5. SOCIAL */
.social-frame { grid-area: social; background: #0a0a0a; display: flex; align-items: center; justify-content: center; border-top: 1px solid #333; }
.s-item { position: absolute; opacity: 0; color: var(--myday-gold); font-weight: bold; font-size: 1.1vw; animation: rotateSocial 9s infinite; }

/* 6. HIGHLIGHTS */
.highlights-frame { grid-area: highlights; background: #000; border-top: 0.4vh solid var(--myday-gold); display: flex; align-items: center; justify-content: center; overflow: hidden; }
.h-item { position: absolute; opacity: 0; font-size: 1.8vw; color: var(--myday-gold); font-weight: 700; animation: slideRightDown var(--cycle-speed) infinite; }

/* ANIMATIONS */
@keyframes glowPulse { 0%, 100% { box-shadow: 0 0 10px var(--myday-gold); transform: scale(1); } 50% { box-shadow: 0 0 25px var(--myday-gold); transform: scale(1.05); } }
@keyframes zoomFade { 0% { opacity: 0; transform: scale(1.25); } 5%, 15% { opacity: 1; } 20%, 100% { opacity: 0; transform: scale(1); } }
@keyframes feedInOut { 0%, 10% { opacity: 0; transform: scale(0.9); filter: blur(10px); } 12%, 18% { opacity: 1; transform: scale(1); filter: blur(0); } 19%, 100% { opacity: 0; transform: scale(1.1); filter: blur(10px); } }
@keyframes slideRightDown { 0%, 10% { opacity: 0; transform: translateX(30vw); } 11.5%, 14% { opacity: 1; transform: translateX(0); } 14.5%, 16% { opacity: 0; transform: translateY(10vh); } 17%, 100% { opacity: 0; } }
@keyframes rotateSocial { 0%, 5% { opacity: 0; transform: translateY(10px); } 10%, 30% { opacity: 1; transform: translateY(0); } 35%, 100% { opacity: 0; transform: translateY(-10px); } }
</style>
</head>
<body>

<button id="start-btn" onclick="this.style.display='none'; document.getElementById('bgm').play();">START BROADCAST</button>
<audio id="bgm" loop src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3"></audio>

<div class="broadcast-container">
    <div class="brand-frame">
        <div class="logo">የእኔ</div>
        <div class="brand-text">የእኔ<span style="color:var(--myday-gold)">ቀን</span> ዜና</div>
    </div>
    <div class="topics-frame">
        <h1 class="main-topic">የኢቶሪካ ነጻነት</h1>
        <p class="sub-topic">የጥበብ ነጻነት የታየበት ታሪካዊ ምዕራፍ</p>
    </div>
    <div class="media-frame">
        <div class="meta-note">ባለቤት: ቴዲ አፍሮ | ምንጭ: የእኔ ቀን መረጃ</div>
        <div class="slide" style="background-image: url('https://images.unsplash.com/photo-1523810192022-5a0fb9aa7bc8?w=800'); animation-delay: 0s;"></div>
        <div class="slide" style="background-image: url('https://images.unsplash.com/photo-1511671782779-c97d3d27a1d4?w=800'); animation-delay: 5s;"></div>
    </div>
    <div class="news-frame">
        <div class="p-item" style="animation-delay: 0s;">ቴዲ አፍሮ ኢቶሪካን በራሱ መልቀቁ በሙዚቃ ኢንዱስትሪው ውስጥ ትልቅ ለውጥ አምጥቷል።</div>
        <div class="p-item" style="animation-delay: 5s;">ለሰዋሰው መልቲሚዲያ የተመለሰው 33 ሚሊዮን ብር የጥበብ ነጻነትን የማረጋገጥ እርምጃ ነው።</div>
    </div>
    <div class="social-frame">
        <div class="s-item">▶ ሰብስክራይብ ያድርጉ</div>
        <div class="s-item" style="animation-delay:3s;">👍 ላይክ ያድርጉ</div>
    </div>
    <div class="highlights-frame">
        <div class="h-item">• 33 ሚሊዮን ብር ተመለሰ</div>
        <div class="h-item" style="animation-delay:2.5s;">• 100% የባለቤትነት መብት</div>
    </div>
</div>

</body>
</html>
