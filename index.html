<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>የእኔ ቀን - Live News</title>
    <link rel="stylesheet" href="./style.css">
</head>
<body>

<div class="broadcast-outer-frame">
    <div class="broadcast-container">
        
        <div class="brand-frame">
            <div class="logo-box">
                <div class="logo">የእኔ</div>
                <div class="live-indicator">LIVE</div>
            </div>
            <div class="channel-info">
                <div class="channel-name">የእኔ ቀን ዜና</div>
                <div class="slogan">እውነተኛ መረጃ ለሁላችንም!</div>
            </div>
        </div>

        <div class="topics-frame">
            <div class="topics-text">
                <h1 class="main-topic" id="main-topic-text">መረጃ እየጠበቅን ነው...</h1>
            </div>
            <div class="live-time-box">
                <div id="real-time">00:00:00</div>
            </div>
        </div>

        <div class="media-frame" id="media-container">
            </div>

        <div class="news-frame" id="news-container">
            </div>

        <div class="social-frame" id="social-container">
            </div>

        <div class="highlights-frame" id="highlights-container">
            </div>
    </div>
</div>

<script src="./script.js"></script>
</body>
</html>
