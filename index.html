<!DOCTYPE html>
<html lang="am">
<head>
<meta charset="UTF-8">
<style>
:root {
    --myday-gold: #FFD700;
    --myday-blue: #002B5B;
    --live-red: #cc0000;
    --glow: 0 0 20px rgba(255, 215, 0, 0.4);
    --cycle-speed: 12s; /* Snappier news transitions */
}

* { box-sizing: border-box; }

body, html { 
    margin: 0; padding: 0; width: 100%; height: 100%; 
    background: #000; overflow: hidden; 
    display: flex; justify-content: center; align-items: center; 
    font-family: 'Nyala', 'Inter', sans-serif; 
}

/* --- PROFESSIONAL OUTER PADDING --- */
.broadcast-outer-frame {
    width: 100vw; height: 100vh;
    padding: 30px; 
    background: #000;
    display: flex; justify-content: center; align-items: center;
}

.broadcast-container {
    width: 100%; height: 100%;
    background: #050505; color: white;
    display: grid;
    grid-template-areas: 
        "brand topics topics"
        "media news news"
        "social highlights highlights";
    grid-template-columns: 32% 1fr 1fr;
    grid-template-rows: 18% 1fr 15%;
    border: 3px solid #333;
    border-radius: 20px;
    overflow: hidden;
    box-shadow: 0 0 60px rgba(0,0,0,1);
}

/* --- LIVE ICON & BRANDING --- */
.brand-frame { 
    grid-area: brand; background: #000; display: flex; align-items: center; 
    padding: 0 5%; border-bottom: 4px solid var(--myday-gold); border-right: 1px solid #333; 
    position: relative;
}
.live-indicator {
    position: absolute; top: 15px; left: 20px;
    background: var(--live-red); color: white;
    padding: 2px 8px; border-radius: 4px; font-size: 0.7vw;
    font-weight: bold; animation: pulseRed 1.5s infinite;
}
.logo { 
    width: 4.5vw; height: 4.5vw; background: var(--myday-gold); color: black; 
    display: flex; align-items: center; justify-content: center; 
    font-weight: 900; font-size: 1.8vw; border-radius: 12px; 
    animation: glowPulse 3s infinite; 
}
.brand-text { margin-left: 1.5vw; font-size: 1.8vw; font-weight: 800; }

/* --- TOPICS --- */
.topics-frame { 
    grid-area: topics; background: var(--myday-blue); 
    display: flex; flex-direction: column; justify-content: center; 
    padding-left: 5%; border-bottom: 4px solid var(--myday-gold); 
}
.main-topic { font-size: 3vw; margin: 0; text-transform: uppercase; }
.sub-topic { font-size: 1.2vw; color: var(--myday-gold); margin: 0; font-style: italic; opacity: 0.9; }

/* --- MEDIA --- */
.media-frame { grid-area: media; position: relative; background: #111; overflow: hidden; border-right: 1px solid #333; }
.slide { position: absolute; inset: 0; background-size: cover; background-position: center; opacity: 0; animation: zoomFade 20s infinite; }
.meta-note { 
    position: absolute; bottom: 8%; left: 5%; background: rgba(0,0,0,0.85); 
    padding: 0.8vw; border-left: 4px solid var(--myday-gold); font-size: 0.8vw; z-index: 5; 
}

/* --- NEWS --- */
.news-frame { grid-area: news; display: flex; align-items: center; justify-content: center; position: relative; padding: 2vw; }
.p-item { position: absolute; opacity: 0; font-size: 2.2vw; text-align: center; width: 85%; animation: feedInOut var(--cycle-speed) infinite; line-height: 1.4; }

/* --- RED ENGAGING SOCIAL FRAME --- */
.social-frame { 
    grid-area: social; background: var(--live-red); 
    display: flex; align-items: center; justify-content: space-around; 
    padding: 0 10px; border-top: 1px solid rgba(255,255,255,0.2); 
}
.s-icon-group { 
    display: flex; flex-direction: column; align-items: center; 
    color: white; font-size: 0.7vw; font-weight: bold;
    transition: transform 0.3s;
}
.s-icon-group svg { width: 1.8vw; height: 1.8vw; fill: white; margin-bottom: 4px; }

/* --- HIGHLIGHTS --- */
.highlights-frame { 
    grid-area: highlights; background: #000; border-top: 4px solid var(--myday-gold); 
    display: flex; align-items: center; justify-content: center; overflow: hidden; 
}
.h-item { position: absolute; opacity: 0; font-size: 1.8vw; color: var(--myday-gold); animation: slideRightDown 10s infinite; }

/* ANIMATIONS */
@keyframes pulseRed { 0% { opacity: 1; } 50% { opacity: 0.3; } 100% { opacity: 1; } }
@keyframes glowPulse { 0%, 100% { box-shadow: 0 0 10px var(--myday-gold); } 50% { box-shadow: 0 0 30px var(--myday-gold); } }
@keyframes zoomFade { 0% { opacity: 0; transform: scale(1.2); } 5%, 45% { opacity: 1; } 50%, 100% { opacity: 0; } }
@keyframes feedInOut { 0%, 5% { opacity: 0; transform: scale(0.95); } 10%, 45% { opacity: 1; transform: scale(1); } 50%, 100% { opacity: 0; } }
@keyframes slideRightDown { 0%, 5% { opacity: 0; transform: translateX(30vw); } 10%, 45% { opacity: 1; transform: translateX(0); } 50%, 100% { opacity: 0; } }
</style>
</head>
<body>

<div class="broadcast-outer-frame">
    <div class="broadcast-container">
        
        <div class="brand-frame">
            <div class="live-indicator">LIVE</div>
            <div class="logo">የእኔ</div>

        </div>

        <div class="topics-frame">
            <h1 class="main-topic">የኢቶሪካ ነጻነት</h1>
            <p class="sub-topic">የጥበብ ነጻነት የታየበት ታሪካዊ ምዕራፍ</p>

            <div class="slide" style="background-image: url('https://images.unsplash.com/photo-1523810192022-5a0fb9aa7bc8?w=800');"></div>
            <div class="slide" style="background-image: url('https://images.unsplash.com/photo-1511671782779-c97d3d27a1d4?w=800'); animation-delay: 10s;"></div>
        </div>

        <div class="news-frame">

                <span>Subscribe</span>
            </div>

            <div class="s-icon-group">

                <span>Share</span>
            </div>
            <div class="s-icon-group">
                <svg viewBox="0 0 24 24"><path d="M12 22c1.1 0 2-.9 2-2h-4c0 1.1.89 2 2 2zm6-6v-5c0-3.07-1.64-5.64-4.5-6.32V4c0-.83-.67-1.5-1.5-1.5s-1.5.67-1.5 1.5v.68C7.63 5.36 6 7.92 6 11v5l-2 2v1h16v-1l-2-2z"/></svg>

        <div class="highlights-frame">
            <div class="h-item">• 33 ሚሊዮን ብር ተመለሰ</div>
            <div class="h-item" style="animation-delay:5s;">• 100% የባለቤትነት መብት</div>
        </div>
    </div>
</div>

</body>
</html>
