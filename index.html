<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>የእኔ ቀን - Live Broadcast</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="broadcast-container">
        <header class="studio-header">
            <div class="logo-group">
                <div class="main-logo">የእኔ</div>
                <div class="live-tag">LIVE</div>
            </div>
            <div class="program-title">የእኔ ቀን ዜና (My Day News)</div>
            <div id="clock" class="digital-clock">00:00:00</div>
        </header>

        <main class="canvas-wrapper">
            <canvas id="newsCanvas" width="1280" height="720"></canvas>
        </main>

        <footer class="ticker-footer">
            <div class="ticker-label">ሰበር ዜና</div>
            <div class="ticker-wrap">
                <div id="ticker-text" class="ticker-move">መረጃ እየጠበቅን ነው... Loading news stream...</div>
            </div>
        </footer>
    </div>
    <script src="script.js"></script>
</body>
</html>
