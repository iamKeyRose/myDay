<!DOCTYPE html>
<html lang="am">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
:root {
    --myday-gold: #FFD700;
    --myday-blue: #002B5B;
    --neon-glow: 0 0 15px rgba(255, 215, 0, 0.6);
    --cycle-speed: 60s;
}

* { box-sizing: border-box; } /* ጠርዞች እንዳይቆረጡ የሚከላከል */

body, html { 
    margin: 0; padding: 0; width: 100%; height: 100%; 
    background: #000; overflow: hidden; 
    display: flex; justify-content: center; align-items: center; 
    font-family: 'Nyala', 'Inter', sans-serif; 
}

#start-btn { 
    position: fixed; z-index: 9999; padding: 1.5vw 3vw; 
    background: var(--myday-gold); border: none; font-weight: 900; 
    cursor: pointer; border-radius: 50px; font-size: 1.2rem; 
    box-shadow: var(--neon-glow); transition: 0.3s;
}
#start-btn:hover { transform: scale(1.1); background: #fff; }

.broadcast-container {
    width: 100vw; height: 100vh;
    background: radial-gradient(circle at center, #0a0a0a 0%, #000 100%);
    color: white;
    display: grid;
    grid-template-areas: 
        "brand topics topics"
        "media news news"
        "social highlights highlights";
    grid-template-columns: 32% 1fr 1fr;
    grid-template-rows: 18% 1fr 12%;
    border: 2px solid #222;
}

/* --- BRANDING --- */
.brand-frame { 
    grid-area: brand; background: #000; display: flex; align-items: center; 
    padding: 0 5%; border-bottom: 4px solid var(--myday-gold); 
    border-right: 1px solid #333;
}
.logo { 
    width: 5vw; height: 5vw; background: var(--myday-gold); color: black; 
    display: flex; align-items: center; justify-content: center; 
    font-weight: 900; font-size: 2vw; border-radius: 12px; 
    animation: glowPulse 3s infinite; 
}
.brand-text { margin-left: 1.5vw; font-size: 1.8vw; font-weight: 800; letter-spacing: 1px; }

/* --- TOPICS --- */
.topics-frame { 
    grid-area: topics; background: var(--myday-blue); 
    display: flex; flex-direction: column; justify-content: center; 
    padding-left: 5%; border-bottom: 4px solid var(--myday-gold);
}
.main-topic { font-size: 3.2vw; margin: 0; line-height: 1.1; }
.sub-topic { font-size: 1.3vw; color: var(--myday-gold); margin: 5px 0 0; font-style: italic; }

/* --- MEDIA --- */
.media-frame { 
    grid-area: media; position: relative; background: #111; 
    overflow: hidden; border-right: 2px solid #333; 
}
.slide { 
    position: absolute; inset: 0; background-size: cover; 
    background-position: center; opacity: 0; 
    animation: zoomFade 30s infinite; 
}
.meta-note { 
    position: absolute; bottom: 8%; left: 5%; right: 5%;
    background: rgba(0,0,0,0.7); backdrop-filter: blur(5px);
    padding: 0.8vw; border-left: 4px solid var(--myday-gold); 
    font-size: 0.9vw; z-index: 5; 
}

/* --- NEWS (CENTERED) --- */
.news-frame { 
    grid-area: news; display: flex; align-items: center; justify-content: center; 
    position: relative; padding: 3vw; 
}
.p-item { 
    position: absolute; opacity: 0; font-size: 2.4vw; 
    text-align: center; width: 85%; line-height: 1.4;
    animation: feedInOut var(--cycle-speed) infinite; 
}

/* --- SOCIAL --- */
.social-frame { 
    grid-area: social; background: #080808; display: flex; 
    align-items: center; justify-content: center; border-top: 1px solid #333; 
}
.s-item { 
    position: absolute; opacity: 0; color: var(--myday-gold); 
    font-weight: bold; font-size: 1.2vw; animation: rotateSocial 9s infinite; 
}

/* --- HIGHLIGHTS --- */
.highlights-frame { 
    grid-area: highlights; background: #000; 
    border-top: 4px solid var(--myday-gold); 
    display: flex; align-items: center; justify-content: center; overflow: hidden; 
}
.h-item { 
    position: absolute; opacity: 0; font-size: 2vw; 
    color: var(--myday-gold); font-weight: 700; 
    animation: slideRightDown var(--cycle-speed) infinite; 
}

/* ANIMATIONS */
@keyframes glowPulse { 0%, 100% { box-shadow: 0 0 10px var(--myday-gold); } 50% { box-shadow: 0 0 30px var(--myday-gold); } }
@keyframes zoomFade { 0% { opacity: 0; transform: scale(1.3); } 5%, 15% { opacity: 1; } 20%, 100% { opacity: 0; transform: scale(1); } }
@keyframes feedInOut { 0%, 10% { opacity: 0; transform: scale(0.85); filter: blur(10px); } 12%, 18% { opacity: 1; transform: scale(1); filter: blur(0); } 19%, 100% { opacity: 0; transform: scale(1.15); filter: blur(10px); } }
@keyframes slideRightDown { 0%, 10% { opacity: 0; transform: translateX(40vw); } 11.5%, 14% { opacity: 1; transform: translateX(0); } 14.5%, 16% { opacity: 0; transform: translateY(10vh); } 17%, 100% { opacity: 0; } }
@keyframes rotateSocial { 0%, 5% { opacity: 0; transform: translateY(15px); } 10%, 30% { opacity: 1; transform: translateY(0); } 35%, 100% { opacity: 0; transform: translateY(-15px); } }

</style>
</head>
<body>

<button id="start-btn" onclick="this.style.display='none'; document.getElementById('bgm').play();">START BROADCAST</button>
<audio id="bgm" loop src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3"></audio>

<div class="broadcast-container">
    <div class="brand-frame">
        <div class="logo">የእኔ</div>
        <div class="brand-text">የእኔ<span style="color:var(--myday-gold)">ቀን</span> ዜና</div>
    </div>
    
    <div class="topics-frame">
        <h1 class="main-topic">የኢቶሪካ ነጻነት</h1>
        <p class="sub-topic">የጥበብ ነጻነት የታየበት ታሪካዊ ምዕራፍ</p>
    </div>

    <div class="media-frame">
        <div class="meta-note">ባለቤት: ቴዲ አፍሮ | ምንጭ: የእኔ ቀን መረጃ</div>
        <div class="slide" style="background-image: url('https://images.unsplash.com/photo-1523810192022-5a0fb9aa7bc8?w=1000'); animation-delay: 0s;"></div>
        <div class="slide" style="background-image: url('https://images.unsplash.com/photo-1511671782779-c97d3d27a1d4?w=1000'); animation-delay: 6s;"></div>
    </div>

    <div class="news-frame">
        <div class="p-item" style="animation-delay: 0s;">ቴዲ አፍሮ ኢቶሪካን በራሱ መልቀቁ በሙዚቃ ኢንዱስትሪው ውስጥ ትልቅ ለውጥ አምጥቷል።</div>
        <div class="p-item" style="animation-delay: 5s;">ለሰዋሰው መልቲሚዲያ የተመለሰው 33 ሚሊዮን ብር የጥበብ ነጻነትን የማረጋገጥ እርምጃ ነው።</div>
    </div>

    <div class="social-frame">
        <div class="s-item">▶ ሰብስክራይብ ያድርጉ</div>
        <div class="s-item" style="animation-delay:3s;">👍 ላይክ ያድርጉ</div>
    </div>

    <div class="highlights-frame">
        <div class="h-item">• 33 ሚሊዮን ብር ተመለሰ</div>
        <div class="h-item" style="animation-delay:2.5s;">• 100% የባለቤትነት መብት</div>
    </div>
</div>

</body>
</html>
