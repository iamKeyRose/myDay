<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>የእኔ ቀን - Canvas Live</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="broadcast-outer-frame">
        <div class="broadcast-container">
            <div class="brand-frame">
                <div class="logo-box">
                    <div class="logo">የእኔ</div>
                    <div class="live-indicator">LIVE</div>
                </div>
                <div class="channel-name">የእኔ ቀን ዜና</div>
            </div>

            <div class="canvas-area">
                <canvas id="newsCanvas" width="1280" height="720"></canvas>
            </div>

            <div class="highlights-frame">
                <div id="ticker-wrap">
                    <span id="ticker-text">መረጃ እየጠበቅን ነው...</span>
                </div>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
