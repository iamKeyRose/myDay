<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <title>የእኔ ቀን - Content Manager</title>
    <style>
        body { font-family: sans-serif; background: #f4f4f4; padding: 40px; }
        .admin-container { max-width: 800px; margin: auto; background: white; padding: 20px; border-radius: 10px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        textarea { width: 100%; height: 300px; margin-top: 10px; padding: 10px; border: 1px solid #ccc; border-radius: 5px; font-size: 14px; }
        .hint { font-size: 12px; color: #666; margin-bottom: 10px; }
        button { background: #002B5B; color: white; border: none; padding: 12px 25px; border-radius: 5px; cursor: pointer; font-weight: bold; margin-top: 10px; }
        button:hover { background: #004080; }
        #output { margin-top: 20px; padding: 10px; background: #e8f0fe; border-radius: 5px; display: none; }
    </style>
</head>
<body>

<div class="admin-container">
    <h2>የእኔ ቀን - Content Parser</h2>
    <p class="hint">Paste your content below. Use labels like <b>Topic:</b>, <b>Subtopic:</b>, <b>Bullet:</b>, <b>Image:</b> etc.</p>
    
    <textarea id="rawContent" placeholder="Topic: የኢቶሪካ ነጻነት
Subtopic: የጥበብ ነጻነት
Paragraph: ቴዲ አፍሮ ኢቶሪካን በራሱ መልቀቁ...
Bullet: 33 ሚሊዮን ብር ተመለሰ
Image: https://link-to-image.jpg
Author: ቴዲ አፍሮ"></textarea>

    <button onclick="processContent()">Parse & Send to Engine</button>

    <div id="output">
        <strong>Parsed JSON Data:</strong>
        <pre id="jsonPreview"></pre>
    </div>
</div>

<script src="admin-parser.js"></script>
</body>
</html>
