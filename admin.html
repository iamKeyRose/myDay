<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <title>የእኔ ቀን - Admin Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: sans-serif; background: #f4f4f4; padding: 20px; }
        .container { max-width: 800px; margin: auto; background: white; padding: 20px; border-radius: 10px; box-shadow: 0 0 10px rgba(0,0,0,0.1); }
        textarea { width: 100%; height: 150px; margin: 10px 0; padding: 10px; }
        button { padding: 10px 20px; cursor: pointer; border: none; border-radius: 5px; }
        .btn-ai { background: #7000ff; color: white; }
        .btn-save { background: #0084ff; color: white; }
        .news-list { margin-top: 30px; }
        .news-card { border: 1px solid #ddd; padding: 10px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; }
        .status-live { color: green; font-weight: bold; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Dashboard</h1>
        
        <h3>Generate News with AI</h3>
        <textarea id="rawInput" placeholder="Paste news link or text here..."></textarea>
        <button class="btn-ai" onclick="generateWithAI()">AI Generate ✨</button>
        <hr>

        <h3>Manual Editor</h3>
        <input type="text" id="topic" placeholder="Topic" style="width: 100%; margin-bottom: 10px;">
        <textarea id="paragraphs" placeholder="Paragraphs (separate with new lines)"></textarea>
        <button class="btn-save" onclick="saveNews()">Save to Database</button>

        <div class="news-list">
            <h3>Recent News Stories</h3>
            <div id="list-container"></div>
        </div>
    </div>
    <script src="admin.js"></script>
</body>
</html>
