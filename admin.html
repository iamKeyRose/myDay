<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <title>Admin - My Day News</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: sans-serif; background: #eee; padding: 40px; }
        .box { background: white; padding: 20px; border-radius: 8px; max-width: 600px; margin: auto; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        textarea { width: 100%; height: 100px; margin-top: 10px; }
        .btn { background: #007bff; color: white; padding: 10px; border: none; width: 100%; cursor: pointer; margin-top: 10px; }
        .btn-ai { background: #6f42c1; }
    </style>
</head>
<body>
    <div class="box">
        <h2>News Creator</h2>
        <textarea id="aiInput" placeholder="Paste source news here..."></textarea>
        <button class="btn btn-ai" onclick="generate()">Generate with AI ✨</button>
        <hr>
        <input type="text" id="t" placeholder="Topic" style="width:100%">
        <textarea id="p" placeholder="Paragraphs (one per line)"></textarea>
        <button class="btn" onclick="save()">Save & Publish Live</button>
    </div>

    <script>
        const supabase = lib.supabase.createClient('https://hghgifkleqhdeqpoqjln.supabase.co', 'sb_publishable_4qkd_gYISl4j_s90SqNQ1w_6nfWRcrd');

        async function save() {
            const topic = document.getElementById('t').value;
            const paras = document.getElementById('p').value.split('\n');
            
            // Set others to false, this one to true
            await supabase.from('news_items').update({ is_active: false }).neq('topic', '---');
            
            const { error } = await supabase.from('news_items').insert([{
                topic: topic, paragraphs: paras, is_active: true, images: ["https://picsum.photos/600/700"]
            }]);
            
            if (!error) alert("News is now LIVE!");
        }

        async function generate() {
            alert("Calling AI... (Ensure Edge Function is deployed)");
            // Function call logic here
        }
    </script>
</body>
</html>
