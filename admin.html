<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <title>አስተዳዳሪ - የእኔ ቀን</title>
    <style>
        body { font-family: sans-serif; background: #f0f2f5; padding: 20px; }
        .panel { max-width: 600px; margin: auto; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        textarea { width: 100%; height: 250px; padding: 15px; border: 2px solid #ddd; border-radius: 8px; font-size: 16px; margin-bottom: 20px; }
        button { width: 100%; background: #002B5B; color: white; border: none; padding: 15px; border-radius: 8px; font-size: 18px; cursor: pointer; font-weight: bold; }
        button:hover { background: #004080; }
        pre { background: #eee; padding: 10px; font-size: 12px; border-radius: 5px; overflow-x: auto; display: none; }
    </style>
</head>
<body>

<div class="panel">
    <h2>የዜና ማስተካከያ ገጽ</h2>
    <p>መረጃውን እዚህ ጋር ይለጥፉ (Paste):</p>
    <textarea id="rawInput" placeholder="Topic: ርዕስ እዚህ ይግባ
Subtopic: ንዑስ ርዕስ
Paragraph: ዝርዝር ዜና...
Bullet: ዋና ነጥብ 1
Bullet: ዋና ነጥብ 2
Image: https://link-to-image.jpg"></textarea>
    <button onclick="publishData()">ለብሮድካስት ላክ</button>
    <pre id="preview"></pre>
</div>

<script>
function publishData() {
    const text = document.getElementById('rawInput').value;
    const lines = text.split('\n');
    let data = { topic: "", subtopic: "", paragraphs: [], bullets: [], images: [] };

    lines.forEach(l => {
        const line = l.trim();
        if (line.startsWith('Topic:')) data.topic = line.replace('Topic:', '').trim();
        else if (line.startsWith('Subtopic:')) data.subtopic = line.replace('Subtopic:', '').trim();
        else if (line.startsWith('Paragraph:')) data.paragraphs.push(line.replace('Paragraph:', '').trim());
        else if (line.startsWith('Bullet:')) data.bullets.push(line.replace('Bullet:', '').trim());
        else if (line.startsWith('Image:')) data.images.push(line.replace('Image:', '').trim());
    });

    localStorage.setItem('newsData', JSON.stringify(data));
    const pre = document.getElementById('preview');
    pre.style.display = 'block';
    pre.textContent = "ተልኳል: " + JSON.stringify(data, null, 2);
    alert("በተሳካ ሁኔታ ተልኳል!");
}
</script>
</body>
</html>
